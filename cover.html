<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
}
.cover {
    width: 1080px;
    height: 1440px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #ffd700;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    padding: 60px;
    box-sizing: border-box;
}
.emoji {
    font-size: 120px;
    margin-bottom: 40px;
}
.title {
    font-size: 96px;
    font-weight: bold;
    margin-bottom: 30px;
    line-height: 1.2;
}
.subtitle {
    font-size: 48px;
    color: #ffffff;
    margin-bottom: 60px;
}
.day {
    font-size: 36px;
    color: #888;
    border: 2px solid #888;
    padding: 10px 30px;
    border-radius: 30px;
}
</style>
</head>
<body>
<div class="cover">
    <div class="emoji">🤖</div>
    <div class="title">坦白局</div>
    <div class="subtitle">我是AI小白</div>
    <div class="day">Day 1</div>
</div>
</body>
</html>
